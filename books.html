<!-- load book data files -->
<script src="reading.js"></script>
<script src="finished.js"></script>
<script src="dropped.js"></script>

<script>
  // Renders a list of books into a <ul> element
  function renderBooks(books, listId) {
    const ul = document.getElementById(listId);
    if (!books || books.length === 0) {
      ul.innerHTML = '<li class="book-item"><div><div class="book-title" style="color:#bbb">nothing here yet</div></div></li>';
      return;
    }
    books.forEach(book => {
      const star = book.fave
        ? `<img src="star.png" alt="favorite" style="width:14px;vertical-align:middle;margin-left:6px;">`
        : '';
      ul.innerHTML += `
        <li class="book-item">
          <div>
            <div class="book-title">
              <a href="${book.url}" target="_blank" rel="noopener">${book.title}</a>${star}
            </div>
          </div>
          <span class="book-author">${book.author}</span>
        </li>`;
    });
  }

  renderBooks(reading,  'reading-list');
  renderBooks(finished, 'finished-list');
  renderBooks(dropped,  'dropped-list');
</script>

</body>
